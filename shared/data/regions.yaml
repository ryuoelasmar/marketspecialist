# Single source of truth: region -> indices, sector ETFs, RSS feeds, keywords.
# Tickers use Yahoo Finance symbols (yfinance).

regions:
  US:
    name: United States
    indices:
      - symbol: "^GSPC"
        name: S&P 500
      - symbol: "^IXIC"
        name: Nasdaq Composite
      - symbol: "^DJI"
        name: Dow Jones Industrial Average
      - symbol: "^RUT"
        name: Russell 2000
      - symbol: "^VIX"
        name: VIX
    sector_etfs:
      - symbol: XLK
        sector: Technology
      - symbol: XLF
        sector: Financials
      - symbol: XLE
        sector: Energy
      - symbol: XLV
        sector: Healthcare
      - symbol: XLI
        sector: Industrials
      - symbol: XLY
        sector: Consumer Discretionary
      - symbol: XLP
        sector: Consumer Staples
      - symbol: XLU
        sector: Utilities
      - symbol: XLB
        sector: Materials
      - symbol: XLRE
        sector: Real Estate
      - symbol: XLC
