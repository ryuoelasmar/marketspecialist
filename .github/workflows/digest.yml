name: Daily Market Digest

on:
  schedule:
    # 11:00 UTC = 07:00 America/New_York (EDT) / 06:00 (EST). Weekdays only.
    - cron: "0 11 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, print the digest to logs instead of emailing"
        type: boolean
        default: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          FRED_KEY: ${{ secrets.FRED_KEY }}
          DIGEST_MODEL: ${{ vars.DIGEST_MODEL || 'claude-sonnet-4-6' }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m digest.main --dry-run
          else
            python -m digest.main
          fi

      - name: Open issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Digest failed on ${today}`,
              body: `The scheduled digest run failed. [See logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
              labels: ['digest-failure']
            });
